<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="text-scale" content="scale" />
    <title>VDL Explorer</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="https://cdn.jsdelivr.net/gh/varavelio/vdl@v0.5.0-alpha.5/assets/svg/icon.svg"
    />
    <link
      rel="icon"
      type="image/x-icon"
      href="https://cdn.jsdelivr.net/gh/varavelio/vdl@v0.5.0-alpha.5/assets/favicon.ico"
    />
    <script src="https://cdn.jsdelivr.net/npm/@varavel/ui@0/static/theme-init.min.js"></script>

    <script>
    // These variables are replaced by the plugin at build time to inject
    // the configuration into the explorer.
    window.__vdl_rpc_base_url = "<baseURL>";
    window.__vdl_ir = {};
    </script>

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
